name: Weekly Health Check

on:
  schedule:
    - cron: '0 9 * * 1'   # 09:00 UTC every Monday
  workflow_dispatch:        # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    # Avoid racing the Google Sheet sync, which regenerates catalog.json
    concurrency:
      group: health-check
      cancel-in-progress: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: pip install requests pandas

    - name: Run health check
      env:
        # Authenticated GitHub API calls get 5000 req/hr instead of 60
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RUN_TIMESTAMP=$(date -u +'%Y-%m-%d') python scripts/health_check.py

    - name: Commit and push results
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions (Health Check)"
        git config --global user.email "actions@github.com"
        git add public/data/health.json docs/data/health.json
        if git diff --staged --quiet; then
          echo "No health changes to commit."
          exit 0
        fi
        BRANCH="auto/health-check-$(date -u +'%Y%m%d')"
        git checkout -b "$BRANCH"
        git commit -m "Weekly health check $(date -u +'%Y-%m-%d')"
        git push -u origin "$BRANCH"
        gh pr create --title "Weekly health check $(date -u +'%Y-%m-%d')" \
          --body "Automated weekly link health check results." \
          --base main
        PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
        # Enable auto-merge (queues behind required checks, if any are ever added). When the
        # PR is already mergeable, GitHub rejects --auto with "clean status", so fall back to
        # an immediate squash merge.
        gh pr merge "$PR_NUM" --squash --auto \
          || gh pr merge "$PR_NUM" --squash \
          || echo "::notice::Merge failed. PR #$PR_NUM needs manual merge."
