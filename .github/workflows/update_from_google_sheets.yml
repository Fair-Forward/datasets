name: Manually Update Website from Google Sheets

on:
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install npm dependencies
      run: npm install

    - name: Create service account credentials
      env:
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      run: |
        echo "Creating credentials file..."
        CRED_DIR="data_sources/google_sheets_api"
        CRED_FILE="$CRED_DIR/service_account_JN.json"
        mkdir -p "$CRED_DIR"

        # Use printf to avoid echo's trailing newline and escape interpretation
        printf '%s' "${GOOGLE_SHEETS_CREDENTIALS}" > "$CRED_FILE"

        # Validate that the file is valid JSON
        if ! python -m json.tool "$CRED_FILE" > /dev/null 2>&1; then
          echo "::error::Invalid JSON in credentials file. Check the GOOGLE_SHEETS_CREDENTIALS secret."
          exit 1
        fi

        if [ ! -f "$CRED_FILE" ] || [ ! -s "$CRED_FILE" ]; then
          echo "::error::Failed to create credentials file."
          exit 1
        fi
        echo "Credentials file created and validated."

    - name: Build Website and Backup Data
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
      run: python scripts/build_and_sync.py

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected."
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected, will create PR."
        fi

    - name: Read diff results
      if: steps.changes.outputs.has_changes == 'true'
      id: diff
      run: |
        if [ -f .diff_exit_code ]; then
          echo "exit_code=$(cat .diff_exit_code)" >> $GITHUB_OUTPUT
        else
          echo "exit_code=0" >> $GITHUB_OUTPUT
        fi
        if [ -f change_summary.md ]; then
          # Use a random delimiter to prevent injection via project titles
          DELIMITER="SUMMARY_$(openssl rand -hex 16)"
          {
            echo "summary<<$DELIMITER"
            cat change_summary.md
            echo "$DELIMITER"
          } >> $GITHUB_OUTPUT
        else
          echo "summary=No change summary available." >> $GITHUB_OUTPUT
        fi

    - name: Create branch and open PR
      if: steps.changes.outputs.has_changes == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BRANCH="auto/sheet-update-$(date -u +'%Y%m%d-%H%M%S')"
        git config --global user.name "GitHub Actions (Sheet Update)"
        git config --global user.email "actions@github.com"
        git checkout -b "$BRANCH"
        git add --all
        git commit -m "Sheet update $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        git push -u origin "$BRANCH"

        # Close any older open auto-update PRs
        OLD_PRS=$(gh pr list --json headRefName,number \
          --jq '.[] | select(.headRefName | startswith("auto/sheet-update")) | .number' || true)
        for pr in $OLD_PRS; do
          gh pr close "$pr" --comment "Superseded by a newer sheet update." || true
        done

        # Read diff exit code
        DIFF_EXIT_CODE="${{ steps.diff.outputs.exit_code }}"

        # Build PR body file (avoids shell injection from Google Sheet content)
        if [ "$DIFF_EXIT_CODE" != "0" ] && [ -n "$DIFF_EXIT_CODE" ]; then
          {
            echo "**This update was flagged for manual review.**"
            echo ""
            cat change_summary.md 2>/dev/null || echo "No change summary available."
            echo ""
            echo "Please review the changes and merge if they look correct, or close the PR to discard them."
          } > pr_body.md
          TITLE="[REVIEW NEEDED] Sheet update $(date -u +'%Y-%m-%d')"
          gh pr create --title "$TITLE" --body-file pr_body.md --base main
          echo "::warning::PR created but requires manual review -- suspicious changes detected."
        else
          TITLE="Sheet update $(date -u +'%Y-%m-%d') (auto-merge)"
          gh pr create --title "$TITLE" --body-file change_summary.md --base main
          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          # Auto-merge if branch protection is configured; skip gracefully if not
          gh pr merge "$PR_NUM" --squash --auto || echo "::notice::Auto-merge not available. PR #$PR_NUM needs manual merge."
          echo "PR #$PR_NUM created."
        fi